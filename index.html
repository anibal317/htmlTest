<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
    <title>Ejercicios HTML</title>
</head>

<body>
    <section id="app">
        <h1><span>#</span> Ejercicios</h1>
        <p class="subtitle">Encontrá el error en cada ejercicio</p>
        <nav>
            <div class="nav-item">
                <a href="./ejercicio1/">
                    <span class="num">1</span>
                    <span>Visor HTML</span>
                </a>
                <button class="download-btn" data-rar="ejercicio1.rar" title="Descargar RAR">&#128230;</button>
            </div>
            <div class="nav-item">
                <a href="./ejercicio2/">
                    <span class="num">2</span>
                    <span>Contador</span>
                </a>
                <button class="download-btn" data-rar="ejercicio2.rar" title="Descargar RAR">&#128230;</button>
            </div>
            <div class="nav-item">
                <a href="./ejercicio3/">
                    <span class="num">3</span>
                    <span>Sumadora</span>
                </a>
                <button class="download-btn" data-rar="ejercicio3.rar" title="Descargar RAR">&#128230;</button>
            </div>
        </nav>
    </section>

    <script>
        document.querySelectorAll(".download-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                const a = document.createElement("a")
                a.href = "./" + btn.dataset.rar
                a.download = btn.dataset.rar
                a.click()
            })
        })
    </script>
</body>

</html>
